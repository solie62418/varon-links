<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>바론 품의서 작성기</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  :root{
    --navy:#24467D;
    --logobg:#2B2E33;
    --teal:#2FA88F;
    --teal-dark:#22836E;
    --gold:#BF8F00;
    --red:#C0392B;
    --green:#2F9E44;
    --bg:#F3F5F6;
    --card:#FFFFFF;
    --border:#E1E4EA;
    --text:#1B1F27;
    --muted:#6B7280;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:"Pretendard","Noto Sans KR","Malgun Gothic","Apple SD Gothic Neo",sans-serif;-webkit-font-smoothing:antialiased;}
  a{color:inherit;}

  .topbar{background:var(--navy);color:#fff;padding:18px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
  .brand{display:flex;align-items:center;gap:12px;text-decoration:none;color:inherit;}
  .brand-badge{width:40px;height:40px;border-radius:10px;background:var(--logobg);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .brand-badge svg{width:20px;height:27px;}
  .brand h1{font-size:17px;margin:0;font-weight:800;}
  .brand p{margin:0;font-size:12px;color:#B9C4DC;}
  .file-status{font-size:12px;color:#CBD5EA;}

  .tabs{display:flex;gap:6px;padding:14px 28px 0;background:var(--bg);border-bottom:1px solid var(--border);flex-wrap:wrap;}
  .tab-btn{border:none;background:transparent;padding:12px 18px;font-size:14px;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;border-radius:8px 8px 0 0;}
  .tab-btn.active{color:var(--navy);border-bottom-color:var(--teal);background:var(--card);}

  main{padding:24px 28px 60px;max-width:1100px;margin:0 auto;}
  .view{display:none;}
  .view.active{display:block;}

  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:18px;}
  .card h3{margin:0 0 14px;font-size:14px;color:var(--navy);}

  .field-row{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:14px;}
  .field{display:flex;flex-direction:column;gap:5px;flex:1;min-width:160px;}
  .field.small{flex:0 0 140px;min-width:120px;}
  .field label{font-size:12px;font-weight:700;color:var(--muted);}
  .field input, .field select, .field textarea{border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;width:100%;}
  .field textarea{resize:vertical;min-height:60px;}
  .field input:focus, .field select:focus, .field textarea:focus{outline:2px solid var(--teal);}

  .section-toggle{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px;}

  table.editor{width:100%;border-collapse:collapse;margin-bottom:10px;}
  table.editor th, table.editor td{border:1px solid var(--border);padding:4px;}
  table.editor th input{background:var(--navy);color:#fff;font-weight:700;text-align:center;border:none;width:100%;padding:6px;border-radius:4px;}
  table.editor td input{border:none;width:100%;padding:6px;font-size:12px;}
  table.editor td input:focus, table.editor th input:focus{outline:2px solid var(--teal);}
  .table-actions{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
  .mini-btn{border:1px solid var(--border);background:#fff;padding:6px 12px;border-radius:999px;font-size:12px;font-weight:700;color:var(--navy);cursor:pointer;}
  .mini-btn:hover{background:var(--bg);}
  .mini-btn.danger{color:var(--red);}

  .btn{background:var(--teal);color:#fff;border:none;font-weight:700;font-size:13px;padding:10px 18px;border-radius:999px;cursor:pointer;}
  .btn:hover{background:var(--teal-dark);}
  .btn.secondary{background:var(--navy);}
  .save-bar{display:flex;justify-content:flex-end;gap:10px;margin-top:10px;}

  .empty{text-align:center;padding:60px 20px;color:var(--muted);}
  .empty .icon{font-size:36px;margin-bottom:8px;}
  .filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center;}
  .search-input{border:1px solid var(--border);border-radius:999px;padding:8px 16px;font-size:13px;min-width:200px;font-family:inherit;flex:1;}

  table.list{width:100%;border-collapse:collapse;background:var(--card);border-radius:var(--radius);overflow:hidden;}
  table.list thead th{background:var(--navy);color:#fff;font-size:12px;text-align:left;padding:10px 12px;font-weight:700;}
  table.list tbody td{padding:10px 12px;font-size:13px;border-bottom:1px solid var(--border);}
  table.list tbody tr:hover{background:#F8FAFD;}
  .badge{display:inline-block;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:700;color:#fff;background:var(--navy);}

  footer{text-align:center;font-size:11px;color:var(--muted);padding:20px;}
</style>
</head>
<body>

<div class="topbar">
  <a href="https://solie62418.github.io/varon-links/" class="brand" title="바론링크로 돌아가기">
    <div class="brand-badge"><svg viewBox="0 0 20 28" fill="none"><path d="M13 0H20L7 28H0L13 0Z" fill="#D9A62E"/></svg></div>
    <div>
      <h1>바론 품의서 작성기</h1>
      <p>새 품의서 작성 · 품의서 이력 · ← 바론링크로 돌아가기</p>
    </div>
  </a>
  <span class="file-status" id="fileStatus">서버에서 거래처·이력 불러오는 중...</span>
</div>

<div class="tabs">
  <button class="tab-btn active" data-view="write">새 품의서 작성</button>
  <button class="tab-btn" data-view="history">품의서 이력</button>
</div>

<main>

  <!-- 새 품의서 작성 -->
  <section class="view active" id="view-write">

    <div class="card">
      <h3>기본 정보</h3>
      <div class="field-row">
        <div class="field">
          <label>제목 (건명)</label>
          <input type="text" id="fTitle" placeholder="예: 네이비 가방 구매의 건">
        </div>
        <div class="field small">
          <label>문서 종류</label>
          <select id="fDocType">
            <option value="구매">구매</option>
            <option value="계약">계약/렌탈</option>
            <option value="사후품의">사후품의</option>
            <option value="의뢰용역">의뢰/용역</option>
            <option value="기타">기타</option>
          </select>
        </div>
        <div class="field small">
          <label>기안분원</label>
          <select id="fBranch">
            <option>바론(본사)</option><option>장안</option><option>서수원</option><option>수원</option>
            <option>운정1</option><option>운정2</option><option>남동탄</option>
          </select>
        </div>
        <div class="field small">
          <label>기안일</label>
          <input type="date" id="fDate">
        </div>
      </div>
      <div class="field">
        <label>서문 (자동 채움, 필요시 수정)</label>
        <textarea id="fIntro" rows="2"></textarea>
      </div>
    </div>

    <div class="card">
      <h3>1. 취지 및 목적</h3>
      <textarea id="fPurpose" rows="3" style="width:100%;border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;" placeholder="한 줄에 한 항목씩 입력하면 자동으로 번호가 매겨집니다"></textarea>
    </div>

    <div class="card">
      <div class="section-toggle"><input type="checkbox" id="fUseCurrent"> 2. 현황 포함</div>
      <textarea id="fCurrent" rows="3" style="width:100%;border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;" placeholder="한 줄에 한 항목씩 입력" disabled></textarea>
    </div>

    <div class="card">
      <h3>3. 비교표</h3>
      <div class="table-actions">
        <select id="tablePreset" class="search-input" style="flex:0 0 180px;min-width:150px;">
          <option value="견적비교">견적비교</option>
          <option value="상세내역">상세내역</option>
          <option value="계약조건">계약조건</option>
          <option value="직접입력">직접입력(빈 표)</option>
        </select>
        <button class="mini-btn" id="applyPresetBtn">이 유형으로 표 만들기</button>
        <button class="mini-btn" id="addColBtn">+ 컬럼 추가</button>
        <button class="mini-btn" id="addRowBtn">+ 행 추가</button>
        <select id="vatMode" class="search-input" style="flex:0 0 190px;min-width:170px;">
          <option value="별도">부가세 별도 (자동 10% 계산)</option>
          <option value="포함">부가세 포함 (계산 생략)</option>
        </select>
        <button class="mini-btn" id="autoCalcBtn">단가×수량 자동계산</button>
      </div>
      <div id="tableEditorWrap"></div>
    </div>

    <div class="card">
      <div class="section-toggle"><input type="checkbox" id="fUseDelivery"> 4. 배송/일정 포함</div>
      <textarea id="fDelivery" rows="2" style="width:100%;border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;" placeholder="예: 배송지, 배송일 등" disabled></textarea>
    </div>

    <div class="card">
      <h3>5. 지급정보</h3>
      <div class="field-row">
        <div class="field"><label>지급계좌</label><input type="text" id="fAccount" placeholder="예: 국민은행 123-456-789 (예금주명)"></div>
        <div class="field small"><label>결제방법</label>
          <select id="fPayMethod"><option>무통장입금</option><option>카드결제</option><option>계좌자동이체</option></select>
        </div>
        <div class="field small"><label>비용(총액)</label><input type="text" id="fAmount" placeholder="예: 290,400원 (VAT포함)"></div>
        <div class="field small"><label>결제시기</label><input type="text" id="fPayDate" placeholder="예: 2026-02-03"></div>
      </div>
    </div>

    <div class="card">
      <h3>6. 공급업체 정보</h3>
      <div class="field-row">
        <div class="field"><label>업체명 (입력 시 등록된 정보 자동완성)</label><input type="text" id="fCompanyName" list="companyList" placeholder="업체명"></div>
        <datalist id="companyList"></datalist>
        <div class="field small"><label>사업자번호</label><input type="text" id="fBizNo"></div>
        <div class="field small"><label>대표자</label><input type="text" id="fCeo"></div>
        <div class="field small"><label>연락처</label><input type="text" id="fPhone"></div>
      </div>
      <label style="font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;">
        <input type="checkbox" id="fSaveCompany" checked> 이 거래처 정보를 저장해서 다음에 자동완성되게 하기
      </label>
    </div>

    <div class="card">
      <h3>7. 첨부파일</h3>
      <textarea id="fAttach" rows="2" style="width:100%;border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;" placeholder="한 줄에 하나씩, 예: 비교견적&#10;사업자등록증"></textarea>
    </div>

    <div class="card">
      <div class="section-toggle"><input type="checkbox" id="fUseEtc"> 8. 기타 포함</div>
      <textarea id="fEtc" rows="2" style="width:100%;border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;" placeholder="예: 계약서는 전자서명 완료 후 별도 첨부 예정" disabled></textarea>
    </div>

    <div class="save-bar">
      <button class="btn secondary" id="downloadOnlyBtn">엑셀만 다운로드</button>
      <button class="btn" id="saveAndDownloadBtn">저장 후 엑셀 다운로드</button>
    </div>
  </section>

  <!-- 품의서 이력 -->
  <section class="view" id="view-history">
    <div id="history-empty" class="empty">
      <div class="icon">🗂️</div>
      <p>저장된 품의서가 없습니다. 새 품의서를 작성하고 저장해보세요.</p>
    </div>
    <div id="history-content" style="display:none;">
      <div class="filter-row">
        <input class="search-input" id="historySearch" placeholder="제목 또는 업체명 검색">
      </div>
      <table class="list"><thead><tr>
        <th>기안일</th><th>제목</th><th>종류</th><th>업체명</th><th>비용</th><th></th>
      </tr></thead><tbody id="historyBody"></tbody></table>
    </div>
  </section>

</main>

<footer>바론네트웍스(주) 총무팀 · 품의서 작성기 v1.0</footer>

<script>
const INTRO_TEMPLATES = {
  "구매": (t) => `${t}(을)를 구매하고자 품의하오니, 검토 후 재가 바랍니다.`,
  "계약": (t) => `${t} 계약을 체결하고자 하오니, 검토 후 승인하여 주시기 바랍니다.`,
  "사후품의": (t) => `${t}을(를) 완료하였으며, 관련 비용이 발생한 바 사후 품의하오니 재가 후 거래처 계좌로 지급하고자 합니다.`,
  "의뢰용역": (t) => `${t} 용역을 의뢰하고자 하오니, 검토 후 재가 바랍니다.`,
  "기타": (t) => `${t}에 대해 품의하오니, 검토 후 재가 바랍니다.`,
};

const TABLE_PRESETS = {
  "견적비교": ["No","견적회사","품명","단가","수량","공급가액","부가세","총금액","비고"],
  "상세내역": ["품명","모델명","업체명","수량","단가","공급금액","출장비","합계금액","비고"],
  "계약조건": ["업체명","모델","규격/용량","계약기간","교환·방문주기","월비용","총계약비용","기타"],
  "직접입력": ["항목1","항목2","항목3"],
};

let tableHeaders = [...TABLE_PRESETS["견적비교"]];
let tableRows = [Array(tableHeaders.length).fill("")];
let companies = [];
let history = [];

/* ---------------- Firebase ---------------- */
const firebaseConfig = {
  apiKey: "AIzaSyACokruLFwbkCpxriOdQgVZAQfryYBmUxM",
  authDomain: "baron-shuttle-ops.firebaseapp.com",
  projectId: "baron-shuttle-ops",
  storageBucket: "baron-shuttle-ops.firebasestorage.app",
  messagingSenderId: "278466071248",
  appId: "1:278466071248:web:e22df780d05e6b46772cd5"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function sanitize(x){ return JSON.parse(JSON.stringify(x || [])); }

async function loadServerData(){
  try{
    const [compDoc, histDoc] = await Promise.all([
      db.collection('purchase_data').doc('companies').get(),
      db.collection('purchase_data').doc('requests').get(),
    ]);
    companies = compDoc.exists ? (compDoc.data().rows || []) : [];
    history = histDoc.exists ? (histDoc.data().rows || []) : [];
    renderCompanyList();
    renderHistory();
    document.getElementById('fileStatus').textContent = `거래처 ${companies.length}건 · 이력 ${history.length}건 불러옴`;
  }catch(err){
    console.error(err);
    document.getElementById('fileStatus').textContent = "서버 연결 실패 (거래처 자동완성/이력 저장 불가, 작성은 가능)";
  }
}

async function saveCompanies(){ await db.collection('purchase_data').doc('companies').set({ rows: sanitize(companies) }); }
async function saveHistory(){ await db.collection('purchase_data').doc('requests').set({ rows: sanitize(history) }); }

/* ---------------- 탭 전환 ---------------- */
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('view-'+btn.dataset.view).classList.add('active');
  });
});

/* ---------------- 기본값 ---------------- */
document.getElementById('fDate').valueAsDate = new Date();
function updateIntro(){
  const type = document.getElementById('fDocType').value;
  const title = document.getElementById('fTitle').value.trim() || "OO";
  document.getElementById('fIntro').value = INTRO_TEMPLATES[type](title);
}
document.getElementById('fDocType').addEventListener('change', updateIntro);
document.getElementById('fTitle').addEventListener('input', updateIntro);
updateIntro();

['fUseCurrent','fUseDelivery','fUseEtc'].forEach(id => {
  const map = { fUseCurrent:'fCurrent', fUseDelivery:'fDelivery', fUseEtc:'fEtc' };
  document.getElementById(id).addEventListener('change', (e) => {
    document.getElementById(map[id]).disabled = !e.target.checked;
  });
});

/* ---------------- 거래처 자동완성 ---------------- */
function renderCompanyList(){
  document.getElementById('companyList').innerHTML = companies.map(c => `<option value="${c.업체명}">`).join('');
}
document.getElementById('fCompanyName').addEventListener('input', (e) => {
  const match = companies.find(c => c.업체명 === e.target.value);
  if(match){
    document.getElementById('fBizNo').value = match.사업자번호 || '';
    document.getElementById('fCeo').value = match.대표자 || '';
    document.getElementById('fPhone').value = match.연락처 || '';
    document.getElementById('fAccount').value = match.계좌 || document.getElementById('fAccount').value;
  }
});

/* ---------------- 비교표 편집기 ---------------- */
function renderTableEditor(){
  const wrap = document.getElementById('tableEditorWrap');
  let html = '<table class="editor"><thead><tr>';
  tableHeaders.forEach((h, ci) => {
    html += `<th>
      <input value="${h}" data-col="${ci}" class="header-input">
      <button type="button" class="mini-btn danger col-del" data-col="${ci}" style="margin-top:4px;width:100%;">컬럼삭제</button>
    </th>`;
  });
  html += '<th style="width:30px;"></th></tr></thead><tbody>';
  tableRows.forEach((row, ri) => {
    html += '<tr>';
    row.forEach((val, ci) => {
      html += `<td><input value="${val}" data-row="${ri}" data-col="${ci}" class="cell-input"></td>`;
    });
    html += `<td><button type="button" class="mini-btn danger row-del" data-row="${ri}">×</button></td></tr>`;
  });
  html += '</tbody></table>';
  wrap.innerHTML = html;

  wrap.querySelectorAll('.header-input').forEach(inp => {
    inp.addEventListener('input', (e) => { tableHeaders[Number(e.target.dataset.col)] = e.target.value; });
  });
  wrap.querySelectorAll('.cell-input').forEach(inp => {
    inp.addEventListener('input', (e) => {
      tableRows[Number(e.target.dataset.row)][Number(e.target.dataset.col)] = e.target.value;
    });
  });
  wrap.querySelectorAll('.row-del').forEach(btn => {
    btn.addEventListener('click', (e) => {
      tableRows.splice(Number(e.target.dataset.row), 1);
      if(tableRows.length === 0) tableRows.push(Array(tableHeaders.length).fill(""));
      renderTableEditor();
    });
  });
  wrap.querySelectorAll('.col-del').forEach(btn => {
    btn.addEventListener('click', (e) => {
      if(tableHeaders.length <= 1){ alert('최소 1개 컬럼은 남아있어야 합니다.'); return; }
      const ci = Number(e.target.dataset.col);
      tableHeaders.splice(ci, 1);
      tableRows.forEach(r => r.splice(ci, 1));
      renderTableEditor();
    });
  });
}
renderTableEditor();

document.getElementById('applyPresetBtn').addEventListener('click', () => {
  const preset = document.getElementById('tablePreset').value;
  tableHeaders = [...TABLE_PRESETS[preset]];
  tableRows = [Array(tableHeaders.length).fill("")];
  renderTableEditor();
});
document.getElementById('addColBtn').addEventListener('click', () => {
  tableHeaders.push("항목" + (tableHeaders.length + 1));
  tableRows.forEach(r => r.push(""));
  renderTableEditor();
});
document.getElementById('addRowBtn').addEventListener('click', () => {
  tableRows.push(Array(tableHeaders.length).fill(""));
  renderTableEditor();
});
document.getElementById('autoCalcBtn').addEventListener('click', () => {
  const idx = (name) => tableHeaders.findIndex(h => h.replace(/\s/g,'') === name);
  const priceIdx = idx('단가'), qtyIdx = idx('수량');
  const supplyIdx = idx('공급가액') >= 0 ? idx('공급가액') : idx('공급금액');
  const vatIdx = idx('부가세');
  const totalIdx = idx('총금액') >= 0 ? idx('총금액') : (idx('합계금액') >= 0 ? idx('합계금액') : idx('총계약비용'));
  if(priceIdx < 0 || qtyIdx < 0){ alert("'단가'와 '수량' 컬럼이 있어야 자동계산할 수 있습니다."); return; }
  const vatMode = document.getElementById('vatMode').value;
  tableRows.forEach(row => {
    const price = Number(String(row[priceIdx]).replace(/[^0-9.-]/g,'')) || 0;
    const qty = Number(String(row[qtyIdx]).replace(/[^0-9.-]/g,'')) || 0;
    const supply = price * qty;
    if(supplyIdx >= 0) row[supplyIdx] = supply ? supply.toLocaleString() : row[supplyIdx];

    // 부가세를 명시적으로 0으로 적어둔 행은 그 값을 그대로 존중하고 자동계산에서 제외
    const vatManualZero = vatIdx >= 0 && String(row[vatIdx]).trim() === '0';

    if(vatIdx >= 0 && !vatManualZero){
      if(vatMode === '포함'){
        row[vatIdx] = '포함';
      }else if(supply){
        row[vatIdx] = Math.round(supply * 0.1).toLocaleString();
      }
    }

    if(totalIdx >= 0 && supply){
      if(vatManualZero || vatMode === '포함'){
        row[totalIdx] = supply.toLocaleString();
      }else if(vatIdx >= 0){
        const vat = Math.round(supply * 0.1);
        row[totalIdx] = (supply + vat).toLocaleString();
      }else{
        row[totalIdx] = supply.toLocaleString();
      }
    }
  });
  renderTableEditor();
});

/* ---------------- 폼 수집 ---------------- */
function collectForm(){
  return {
    title: document.getElementById('fTitle').value.trim(),
    docType: document.getElementById('fDocType').value,
    branch: document.getElementById('fBranch').value,
    date: document.getElementById('fDate').value,
    intro: document.getElementById('fIntro').value.trim(),
    purpose: document.getElementById('fPurpose').value.trim(),
    useCurrent: document.getElementById('fUseCurrent').checked,
    current: document.getElementById('fCurrent').value.trim(),
    tableHeaders: [...tableHeaders],
    tableRows: tableRows.map(r => [...r]),
    useDelivery: document.getElementById('fUseDelivery').checked,
    delivery: document.getElementById('fDelivery').value.trim(),
    account: document.getElementById('fAccount').value.trim(),
    payMethod: document.getElementById('fPayMethod').value,
    amount: document.getElementById('fAmount').value.trim(),
    payDate: document.getElementById('fPayDate').value.trim(),
    companyName: document.getElementById('fCompanyName').value.trim(),
    bizNo: document.getElementById('fBizNo').value.trim(),
    ceo: document.getElementById('fCeo').value.trim(),
    phone: document.getElementById('fPhone').value.trim(),
    attach: document.getElementById('fAttach').value.trim(),
    useEtc: document.getElementById('fUseEtc').checked,
    etc: document.getElementById('fEtc').value.trim(),
  };
}

function numbered(text){
  return text.split('\n').map(l => l.trim()).filter(Boolean);
}

function looksNumeric(val){
  if(val === "" || val === null || val === undefined) return null; // 판단 보류(빈칸)
  const str = String(val).trim();
  const stripped = str.replace(/[,\s원₩]/g, ''); // 콤마·공백·원화기호만 제거 (문자가 섞인 값은 숫자로 보지 않음)
  if(stripped === '') return false;
  return /^-?\d+(\.\d+)?$/.test(stripped);
}

function detectNumericColumns(headers, tableRows){
  return headers.map((h, ci) => {
    const results = tableRows.map(r => looksNumeric(r[ci])).filter(v => v !== null); // 빈칸 제외하고 판단
    if(results.length === 0) return false; // 값이 하나도 없으면 숫자 컬럼으로 보지 않음
    return results.every(v => v === true);
  });
}

function estimateLines(text, colSpanWidthUnits){
  const charsPerLine = Math.max(8, Math.floor(colSpanWidthUnits / 1.9));
  return Math.max(1, Math.ceil((text || "").length / charsPerLine));
}

function buildWorkbook(f){
  const rows = [];
  const merges = [];
  const rowHeights = {};
  const centerRows = new Set();
  const colSpan = Math.max(1, f.tableHeaders.length);
  const mergeEndCol = colSpan;

  const cols = [{wch:3}, {wch:20}];
  for(let i=1;i<colSpan;i++) cols.push({wch:14});
  const colWidthUnitsTotal = cols.slice(1, 1+colSpan).reduce((s,c)=>s+c.wch,0);

  let started = false;
  function startBlock(){
    if(started) rows.push([]); // 블록 사이 빈 줄
    started = true;
  }
  function addTextRow(text, opts={}){
    const r = rows.length;
    rows.push(["", text]);
    if(mergeEndCol > 1){ merges.push({ s:{r,c:1}, e:{r,c:mergeEndCol} }); }
    const lines = estimateLines(text, colWidthUnitsTotal);
    rowHeights[r] = Math.max(18, lines * 15 + 4);
    if(opts.center) centerRows.add(r);
    return r;
  }
  function addPlainRow(arr){ rows.push(arr); return rows.length - 1; }

  // 1. 제목
  startBlock();
  const titleRow = addTextRow(f.title);
  // 2. 서문
  startBlock();
  addTextRow(f.intro);
  // 3. 다음 표시
  startBlock();
  addTextRow("-다  음-", { center:true });
  // 4. 취지 및 목적
  startBlock();
  addTextRow("1. 취지 및 목적");
  numbered(f.purpose).forEach(line => addTextRow("  - " + line));

  let secNum = 2;
  if(f.useCurrent && f.current){
    startBlock();
    addTextRow(`${secNum}. 현황`);
    numbered(f.current).forEach((line,i) => addTextRow(`  ${i+1}) ${line}`));
    secNum++;
  }

  // 비교표 (제목과 표를 별도 블록으로 — 예시 양식과 동일)
  startBlock();
  addTextRow(`${secNum}. 비교표`);
  secNum++;
  startBlock();
  const headerRowIdx = addPlainRow(["", ...f.tableHeaders]);
  const numericColMask = detectNumericColumns(f.tableHeaders, f.tableRows);
  const numericColIdx = numericColMask.map((v,i)=>v?i:-1).filter(i=>i>=0);
  const firstDataRow = headerRowIdx + 1;
  f.tableRows.forEach(r => {
    const converted = r.map((val, ci) => {
      if(!numericColIdx.includes(ci)) return val;
      const stripped = String(val).trim().replace(/[,\s원₩]/g, '');
      if(!/^-?\d+(\.\d+)?$/.test(stripped)) return val; // "포함" 같은 텍스트는 그대로 유지
      return Number(stripped);
    });
    addPlainRow(["", ...converted]);
  });

  if(f.useDelivery && f.delivery){
    startBlock();
    addTextRow(`${secNum}. 배송/일정`);
    numbered(f.delivery).forEach(line => addTextRow("  - " + line));
    secNum++;
  }

  startBlock();
  addTextRow(`${secNum}. 지급정보`);
  addTextRow("  - 지급계좌: " + f.account);
  addTextRow("  - 결제방법: " + f.payMethod);
  addTextRow("  - 비용: " + f.amount);
  addTextRow("  - 결제시기: " + f.payDate);
  secNum++;

  startBlock();
  addTextRow(`${secNum}. 공급업체 정보`);
  addTextRow("  - 업체명: " + f.companyName);
  addTextRow("  - 사업자번호: " + f.bizNo);
  addTextRow("  - 대표자: " + f.ceo);
  addTextRow("  - 연락처: " + f.phone);
  secNum++;

  startBlock();
  addTextRow(`${secNum}. 첨부파일`);
  numbered(f.attach).forEach((line,i) => addTextRow(`  ${i+1}) ${line}`));
  secNum++;

  if(f.useEtc && f.etc){
    startBlock();
    addTextRow(`${secNum}. 기타`);
    numbered(f.etc).forEach(line => addTextRow("  - " + line));
  }

  startBlock();
  addTextRow("-끝-", { center:true });

  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = cols;
  ws['!merges'] = merges;
  ws['!rows'] = [];
  Object.entries(rowHeights).forEach(([r, h]) => { ws['!rows'][Number(r)] = { hpx: h }; });

  try{
    merges.forEach(m => {
      const cell = ws[XLSX.utils.encode_cell({r:m.s.r, c:m.s.c})];
      if(cell) cell.s = { alignment:{ wrapText:true, vertical:'top', horizontal: centerRows.has(m.s.r) ? 'center' : 'left' } };
    });
    const titleCell = ws[XLSX.utils.encode_cell({r:titleRow,c:1})];
    if(titleCell) titleCell.s = { font:{ bold:true, sz:14 }, alignment:{ wrapText:true, horizontal:'center', vertical:'center' } };
    for(let c=1;c<=f.tableHeaders.length;c++){
      const cell = ws[XLSX.utils.encode_cell({r:headerRowIdx,c})];
      if(cell) cell.s = { font:{ bold:true, color:{rgb:"FFFFFF"} }, fill:{ fgColor:{rgb:"24467D"} }, alignment:{ wrapText:true, horizontal:'center' } };
    }
    // 숫자 컬럼에 천단위 콤마 서식 적용 (직접 콤마를 입력하지 않아도 자동 표시)
    for(let ri=firstDataRow; ri<firstDataRow+f.tableRows.length; ri++){
      numericColIdx.forEach(ci => {
        const cell = ws[XLSX.utils.encode_cell({r:ri, c:ci+1})];
        if(cell && cell.t === 'n') cell.z = "#,##0";
      });
    }
  }catch(e){ /* 스타일 미지원 환경이면 값만 정상 출력 */ }

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "품의서");
  return wb;
}

function downloadWorkbook(f){
  const wb = buildWorkbook(f);
  const safeName = (f.title || "품의서").replace(/[\\/:*?"<>|]/g,'_');
  XLSX.writeFile(wb, `${safeName}.xlsx`);
}

document.getElementById('downloadOnlyBtn').addEventListener('click', () => {
  const f = collectForm();
  if(!f.title){ alert('제목을 입력해주세요.'); return; }
  downloadWorkbook(f);
});

document.getElementById('saveAndDownloadBtn').addEventListener('click', async () => {
  const f = collectForm();
  if(!f.title){ alert('제목을 입력해주세요.'); return; }
  const btn = document.getElementById('saveAndDownloadBtn');
  btn.textContent = '저장 중...'; btn.disabled = true;
  try{
    history.push({
      기안일: f.date, 제목: f.title, 종류: f.docType, 분원: f.branch,
      업체명: f.companyName, 비용: f.amount, 데이터: f,
    });
    await saveHistory();
    if(document.getElementById('fSaveCompany').checked && f.companyName){
      const exists = companies.find(c => c.업체명 === f.companyName);
      if(!exists){
        companies.push({ 업체명: f.companyName, 사업자번호: f.bizNo, 대표자: f.ceo, 연락처: f.phone, 계좌: f.account });
        await saveCompanies();
        renderCompanyList();
      }
    }
    downloadWorkbook(f);
    renderHistory();
    document.getElementById('fileStatus').textContent = '저장 완료 · 엑셀 다운로드됨';
  }catch(err){
    console.error(err);
    alert('서버 저장에 실패했습니다. 엑셀은 그래도 받으시겠어요?');
    downloadWorkbook(f);
  }finally{
    btn.textContent = '저장 후 엑셀 다운로드'; btn.disabled = false;
  }
});

/* ---------------- 이력 ---------------- */
let historySearchTerm = "";
document.getElementById('historySearch').addEventListener('input', (e) => {
  historySearchTerm = e.target.value.trim().toLowerCase();
  renderHistory();
});

function renderHistory(){
  const has = history.length > 0;
  document.getElementById('history-empty').style.display = has ? 'none' : 'block';
  document.getElementById('history-content').style.display = has ? 'block' : 'none';
  if(!has) return;

  let rows = [...history].sort((a,b) => (b.기안일||'').localeCompare(a.기안일||''));
  if(historySearchTerm){
    rows = rows.filter(r =>
      String(r.제목||'').toLowerCase().includes(historySearchTerm) ||
      String(r.업체명||'').toLowerCase().includes(historySearchTerm)
    );
  }

  document.getElementById('historyBody').innerHTML = rows.map((r) => {
    const idx = history.indexOf(r);
    return `<tr>
      <td>${r.기안일||'-'}</td>
      <td>${r.제목||'-'}</td>
      <td><span class="badge">${r.종류||'-'}</span></td>
      <td>${r.업체명||'-'}</td>
      <td>${r.비용||'-'}</td>
      <td><button type="button" class="mini-btn reuse-btn" data-idx="${idx}">불러오기</button></td>
    </tr>`;
  }).join('');

  document.querySelectorAll('.reuse-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const rec = history[Number(e.target.dataset.idx)];
      if(!rec || !rec.데이터) return;
      loadFormFromRecord(rec.데이터);
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
      document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
      document.querySelector('.tab-btn[data-view="write"]').classList.add('active');
      document.getElementById('view-write').classList.add('active');
    });
  });
}

function loadFormFromRecord(f){
  document.getElementById('fTitle').value = f.title || '';
  document.getElementById('fDocType').value = f.docType || '구매';
  document.getElementById('fBranch').value = f.branch || '바론(본사)';
  document.getElementById('fDate').valueAsDate = new Date();
  document.getElementById('fIntro').value = f.intro || '';
  document.getElementById('fPurpose').value = f.purpose || '';
  document.getElementById('fUseCurrent').checked = !!f.useCurrent;
  document.getElementById('fCurrent').value = f.current || '';
  document.getElementById('fCurrent').disabled = !f.useCurrent;
  tableHeaders = f.tableHeaders ? [...f.tableHeaders] : [...TABLE_PRESETS["견적비교"]];
  tableRows = f.tableRows ? f.tableRows.map(r => [...r]) : [Array(tableHeaders.length).fill("")];
  renderTableEditor();
  document.getElementById('fUseDelivery').checked = !!f.useDelivery;
  document.getElementById('fDelivery').value = f.delivery || '';
  document.getElementById('fDelivery').disabled = !f.useDelivery;
  document.getElementById('fAccount').value = f.account || '';
  document.getElementById('fPayMethod').value = f.payMethod || '무통장입금';
  document.getElementById('fAmount').value = f.amount || '';
  document.getElementById('fPayDate').value = f.payDate || '';
  document.getElementById('fCompanyName').value = f.companyName || '';
  document.getElementById('fBizNo').value = f.bizNo || '';
  document.getElementById('fCeo').value = f.ceo || '';
  document.getElementById('fPhone').value = f.phone || '';
  document.getElementById('fAttach').value = f.attach || '';
  document.getElementById('fUseEtc').checked = !!f.useEtc;
  document.getElementById('fEtc').value = f.etc || '';
  document.getElementById('fEtc').disabled = !f.useEtc;
}
